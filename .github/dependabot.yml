version: 2
updates:
  # Use the `bun` ecosystem, not `npm`: only `bun` knows how to update bun.lock.
  # With `npm`, Dependabot rewrites package.json but leaves the lockfile stale,
  # so CI's `bun install --frozen-lockfile` fails on every one of its PRs.
  # Trade-off: the bun ecosystem supports version updates but not security updates.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # One grouped PR per ecosystem per week, instead of one PR per dependency.
    groups:
      bun:
        patterns: ["*"]
    ignore:
      # tsup builds .d.ts with rollup-plugin-dts, which reads the internal
      # `useCaseSensitiveFileNames` API that TypeScript 7 removed. Taking TS 7
      # breaks the type output — the whole point of this SDK. Without this,
      # every weekly grouped PR would pull TS 7 in and fail CI.
      # Remove this once tsup supports TypeScript 7.
      - dependency-name: "typescript"
        versions: [">=7"]
    labels: [dependencies]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
