version: 2
updates:
  # Use the `bun` ecosystem, not `npm`: only `bun` knows how to update bun.lock.
  # With `npm`, Dependabot rewrites package.json but leaves the lockfile stale,
  # so CI's `bun install --frozen-lockfile` fails on every one of its PRs.
  # Trade-off: the bun ecosystem supports version updates but not security updates.
  - package-ecosystem: bun
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # One grouped PR per ecosystem per week, instead of one PR per dependency.
    groups:
      bun:
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
