version: 2
updates:
  # One grouped PR per ecosystem per week, instead of one PR per dependency.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm:
        patterns: ["*"]
    labels: [dependencies]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
