name: PR Release Preview Comment

# Posts (or updates) the release preview produced by "PR Release Preview" as a PR
# comment. Runs in the base-repo context via workflow_run, so it has the write
# access the preview job intentionally lacks — safe for PRs from forks.

on:
  workflow_run:
    workflows: [PR Release Preview]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false # comments via the API, never pushes

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: release-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post preview comment
        run: bun scripts/tegami.ts pr comment preview.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
