name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false # read-only job, never pushes
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run lint
      # `build` MUST precede `typecheck`: apps/docs and apps/demo-worker import
      # `videos-sdk`, whose exports map resolves to packages/videos-sdk/dist/*.d.ts.
      # On a clean checkout that directory doesn't exist until the SDK is built.
      - run: bun run build
      - run: bun run typecheck
      - run: bun run --filter videos-sdk test
