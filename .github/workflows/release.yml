name: Release

# Two merges, one release — and that is forced on us, not a preference.
#
#   1. A merge to `main` lands a releasable commit (`feat(videos-sdk): ...`).
#   2. This workflow drafts the changelog from the conventional commits since the last
#      tag, bumps the version, and opens a **"Version Packages" PR** with package.json,
#      CHANGELOG.md and bun.lock.
#   3. Merging that PR puts the bump on `main`, which runs this workflow again. Now the
#      version in the repo is ahead of the one on npm, so Tegami publishes (OIDC trusted
#      publishing, with provenance) and creates the tag + GitHub Release.
#
# Why not commit the bump straight to `main` (one merge, which is what we had)? Because
# `main` is a protected branch: pushes are restricted to a named user AND a `check`
# status is required, and a commit the runner creates has neither. The bot can only push
# to an unprotected branch — hence the PR. The one-merge flow needs a pusher that can
# bypass protection, which means one of: a GitHub App installed on the org (add it to a
# repo ruleset's bypass list), a fine-grained PAT with Contents:write, or GitHub Team
# (org rulesets, where `GitHub Actions` itself can be a bypass actor — the free plan
# cannot). Given any of those, drop `versionPr`, commit the bump, and call `publish`.
#
# The publish lock is gitignored, so it never outlives the runner and a half-finished run
# can't wedge the next one.
#
# Tegami pushes the version branch with GITHUB_TOKEN, and GitHub does not trigger
# workflows on GITHUB_TOKEN pushes — so this cannot loop. It also means the Version
# Packages PR gets no `check` run of its own; merge it as an admin.

on:
  push:
    branches: [main]

# Serialize releases so two pushes can't publish at once.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version branch, the tag, and the GitHub Release
  pull-requests: write # open/update the Version Packages PR
  id-token: write # npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Tegami needs full history + tags to find the commit range
          persist-credentials: false # Tegami re-authenticates origin before pushing

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1. Pinned rather than @latest so a bad npm
      # release can't silently enter a job that holds an OIDC token.
      - run: npm install -g npm@11.16.0

      - run: bun install --frozen-lockfile

      # Safety gate: `build` is the tsup/dts pipeline that produces what we ship.
      - run: bun run build
      - run: bun run typecheck
      - run: bun run --filter videos-sdk test

      # `ci` = version + publish. On a run where releasable commits are pending it opens
      # (or updates) the Version Packages PR and stops. On the run after that PR merges,
      # the repo version is ahead of npm, so it publishes, tags, and cuts the Release.
      - name: Version or publish
        run: bun scripts/tegami.ts ci
