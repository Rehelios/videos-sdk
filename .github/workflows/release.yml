name: Release

# Publishes packages/videos-sdk to npm whenever a GitHub Release is published
# (create one with a v-tag, e.g. v0.1.0). Uses the NPM_TOKEN secret (an npm
# Automation/Granular token that bypasses 2FA) and adds build provenance.
on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run --filter videos-sdk build
      - run: bun run --filter videos-sdk test
      - run: npm publish --provenance --access public
        working-directory: packages/videos-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
