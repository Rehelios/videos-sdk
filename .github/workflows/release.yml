name: Release

# Changesets-style release flow, driven by Tegami (scripts/tegami.ts).
#
# On every push to main:
#   - If there are pending changelog entries under .tegami/changes/, Tegami opens
#     (or updates) a "Version Packages" PR that bumps versions, writes CHANGELOG.md
#     and the publish lock. Nothing is published on this run.
#   - Once that PR is merged, the next push to main has no pending entries, so Tegami
#     publishes packages/videos-sdk to npm (OIDC trusted publishing, with provenance)
#     and creates the matching GitHub Release + tag automatically.
#
# Contributors never cut releases by hand: they add a changelog entry with
# `bun run release` in their PR (see CONTRIBUTING.md), and merging the Version
# Packages PR ships it.
#
# One-time bootstrap (solves npm's egg-or-chicken: the package must exist before
# a trusted publisher can be configured). Run locally, once:
#   npm login
#   bun run release                 # add a changelog entry
#   bun scripts/tegami.ts version   # write the publish lock
#   bun scripts/tegami.ts npm pretrust
# `pretrust` publishes a placeholder and configures npm trusted publishing for
# this workflow automatically — no npmjs.com UI needed. See CONTRIBUTING.md.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Serialize releases so two pushes can't publish or open the version PR at once.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version branch, create tags + GitHub Releases
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Tegami resolves commits/PRs from full history
          # Don't leave the token in .git/config: Tegami re-authenticates `origin`
          # itself (git remote set-url with x-access-token) before pushing the
          # version branch, so nothing here needs persisted credentials.
          persist-credentials: false
          # Optional: set a RELEASE_TOKEN (PAT) secret so the Version Packages PR
          # triggers CI. With the default GITHUB_TOKEN, GitHub does not run
          # workflows on token-authored PRs.
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1. Pinned rather than @latest so a
      # bad npm release can't silently enter a job that holds an OIDC token.
      - run: npm install -g npm@11.16.0

      - run: bun install --frozen-lockfile

      # Safety gate before publishing (the Version Packages PR itself doesn't run CI).
      # `build` runs here too: it's the tsup/dts pipeline that produces what we ship.
      - run: bun run build
      - run: bun run typecheck
      - run: bun run --filter videos-sdk test

      - name: Version PR or publish
        run: bun scripts/tegami.ts ci
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
